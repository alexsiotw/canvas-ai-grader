/**
 * Use a Render Blueprint to deploy your backend.
 * This file tells Render how to build and run your Express server.
 */
services:
  - type: web
    name: canvas-ai-grader
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node index.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # You will set this manually in the Render dashboard
      - key: PORT
        value: 3000
